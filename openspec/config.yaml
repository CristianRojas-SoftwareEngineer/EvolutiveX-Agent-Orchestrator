schema: spec-driven

context: |
  Proyecto: Smart Code Proxy — proxy HTTP de observabilidad entre Claude Code y APIs Anthropic-compatible.
  Alcance: reenvío transparente (latencia cero), auditoría en sessions/, métricas de uso; no orquestar el loop agéntico del cliente.
  Cliente objetivo: Claude Code vía ANTHROPIC_BASE_URL; otros harnesses (p. ej. Cursor) fuera de alcance.

  Stack: TypeScript 6 (ESM), Fastify 5, Vitest 4, tsup.
  Arquitectura PKA (dependencias solo hacia el dominio):
    - 1-domain: tipos y lógica pura
    - 2-services: adapters, ports, I/O (sessions/, streams)
    - 3-operations: handlers de casos de uso
    - 4-api: composition root y env
    - 5-user-interfaces: HTTP (proxy.routes, controllers)

  OpenSpec: brownfield; openspec/specs/ = comportamiento acordado; openspec/changes/<change>/ = deltas y planificación.
  Convenciones: respuestas y commits en español; términos técnicos estándar en inglés si reducen ambigüedad (API, SSE, token, usage).
  Guías del repo: AGENTS.md, CLAUDE.md; detalle de arquitectura en README.md.

  Verificación habitual: npm run test:quick (lint + typecheck + unit); npm run test antes de cerrar cambios que toquen build o integración.

rules:
  proposal:
    - Enfocar problema, motivación, alcance y valor; sin checklist de implementación ni diseño detallado
    - Incluir sección "No objetivos" cuando el cambio sea amplio o ambiguo
    - Indicar capas PKA afectadas (1-domain … 5-user-interfaces) y directorios clave (src/, sessions/, docs/)
    - Enlazar documentación existente en docs/ en lugar de copiar contenido largo

  specs:
    - Escribir deltas normativos contra openspec/specs/ con secciones ADDED, MODIFIED, REMOVED y RENAMED cuando aplique
    - Requisitos verificables; escenarios en Given/When/Then cuando describan comportamiento observable
    - Referenciar specs y patrones del repo antes de definir comportamiento nuevo
    - Sin estrategia de implementación, tareas ni fragmentos de código extensos

  design:
    - Explicar cómo implementar respetando PKA: capas externas dependen de internas, nunca al revés
    - Componer observabilidad del gateway con el protocolo Anthropic; no duplicar lógica de dominio ya existente
    - Nombrar handlers, services y ports concretos en src/ cuando propongas cambios estructurales
    - Sin desglose de tareas (eso va en tasks.md)

  tasks:
    - Cada tarea verificable con comando npm o criterio explícito de aceptación
    - Preferir npm run test:quick para validación incremental; npm run test si el change afecta build o empaquetado
    - Ordenar tareas según dependencias PKA (dominio → servicios → operations → api → UI)
    - No incluir tareas especulativas ni trabajo fuera del alcance del change
