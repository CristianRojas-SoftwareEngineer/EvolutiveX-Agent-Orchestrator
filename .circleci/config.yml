# CircleCI CI — tts-sidecar
# Job: Windows x86_64
version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    working_directory: ~/EvolutiveX-Agent-Orchestrator
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-win-{{ checksum "sidecar/Cargo.lock" }}
            - cargo-win-
      - run:
          name: "Instalar Rust toolchain MinGW"
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://win.rustup.rs -o rustup-init.exe
            ./rustup-init.exe -y --default-toolchain stable
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            rustup set default-host x86_64-pc-windows-gnu
            rustup toolchain install stable-x86_64-pc-windows-gnu
            rustup target add x86_64-pc-windows-gnu --toolchain stable-x86_64-pc-windows-gnu
      - run:
          name: "Diagnosticar ubicaciones de rustup"
          command: |
            echo "=== Variables clave ==="
            echo "USERPROFILE=$USERPROFILE"
            echo "LOCALAPPDATA=$LOCALAPPDATA"
            echo "CARGO_HOME=${CARGO_HOME:-no-set}"
            echo "RUSTUP_HOME=${RUSTUP_HOME:-no-set}"
            echo ""
            echo "=== Buscar gcc.exe en todo el disco ==="
            find /c -name "gcc.exe" 2>/dev/null | head -20
            echo ""
            echo "=== Listar rustup toolchains en USERPROFILE ==="
            ls "$USERPROFILE/.rustup/toolchains/" 2>/dev/null || echo "NO existe: $USERPROFILE/.rustup/toolchains/"
            echo ""
            echo "=== Listar rustup toolchains en LOCALAPPDATA ==="
            ls "$LOCALAPPDATA/Rustup/toolchains/" 2>/dev/null || echo "NO existe: $LOCALAPPDATA/Rustup/toolchains/"
            echo ""
            echo "=== Listar CARGO_HOME ==="
            ls "${CARGO_HOME:-$USERPROFILE/.cargo}/toolchains/" 2>/dev/null || echo "no toolchains en CARGO_HOME"
      - run:
          name: "Crear cargo config con paths correctos"
          command: |
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            mkdir -p .cargo
            # Usar rustup which para obtener la ruta real de gcc
            GCC_PATH=$(rustup which gcc 2>/dev/null)
            AR_PATH=$(rustup which ar 2>/dev/null)
            echo "gcc encontrado en: $GCC_PATH"
            echo "ar encontrado en: $AR_PATH"
            # Convertir a forward slashes para TOML
            GCC_FW="${GCC_PATH//\\\\//}"
            AR_FW="${AR_PATH//\\\\//}"
            echo "gcc (fw): $GCC_FW"
            echo "ar (fw): $AR_FW"
            cat > .cargo/config.toml \<< EOF
            [target.x86_64-pc-windows-gnu]
            ar = "$AR_FW"
            linker = "$GCC_FW"
            EOF
            cat .cargo/config.toml
      - run:
          name: "Compilar tts-sidecar"
          command: |
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            # Agregar el directorio de gcc al PATH para cc-rs
            GCC_DIR=$(dirname "$(rustup which gcc)")
            export PATH="$GCC_DIR:$PATH"
            echo "PATH=${PATH}"
            echo "gcc disponible: $(which gcc)"
            cargo build --release \
              --manifest-path sidecar/Cargo.toml \
              --target x86_64-pc-windows-gnu
      - save_cache:
          key: cargo-win-{{ checksum "sidecar/Cargo.lock" }}
          paths:
            - C:\Users\circleci\.cargo\registry
            - C:\Users\circleci\.cargo\git
      - run:
          name: "Empaquetar artefacto"
          command: |
            mkdir -p staging
            cp sidecar/target/x86_64-pc-windows-gnu/release/tts-sidecar.exe staging/
            cd staging && zip -r ../tts-sidecar-windows-x86_64.zip . && cd ..
            sha256sum tts-sidecar-windows-x86_64.zip | awk '{print "windows-x86_64=" $1}' \
              > tts-sidecar-windows-x86_64.sha256.txt
      - store_artifacts:
          path: tts-sidecar-windows-x86_64.zip
      - store_artifacts:
          path: tts-sidecar-windows-x86_64.sha256.txt

workflows:
  build-windows:
    jobs:
      - build-windows