# CircleCI CI — tts-sidecar
# Multi-platform: Linux x86_64, Windows x86_64, macOS Universal
version: 2.1

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Descarga el modelo de voz una sola vez y lo persiste al workspace.
  # Se comparte con los 3 jobs de compilación en el mismo pipeline.
  # Entre pipelines, se restaura desde caché (evita re-descargar).
  # ─────────────────────────────────────────────────────────────────
  download-model:
    docker:
      - image: cimg/base:stable
    working_directory: ~/EvolutiveX-Agent-Orchestrator
    steps:
      - restore_cache:
          keys:
            - voice-model-es-MX-claude-high-v2

      - run:
          name: "Descargar paquete oficial de sherpa-onnx y extraer todo"
          command: |
            MODEL_DIR="vendor/tts-sidecar/voices/es_MX-claude-high"
            mkdir -p "$MODEL_DIR"
            if [ ! -f "$MODEL_DIR/es_MX-claude-high.onnx" ]; then
              echo "Descargando paquete oficial de sherpa-onnx..."
              curl -L "https://github.com/k2-fsa/sherpa-onnx/releases/download/tts-models/vits-piper-es_MX-claude-high.tar.bz2" \
                -o /tmp/vits-piper.tar.bz2
              mkdir -p /tmp/vits-piper
              tar -xjf /tmp/vits-piper.tar.bz2 -C /tmp/vits-piper
              # Extraer todo el contenido: modelo, tokens y espeak-ng-data
              cp -r /tmp/vits-piper/vits-piper-es_MX-claude-high/* "$MODEL_DIR/"
              # El binary deriva el path de tokens como: model.onnx → model.onnx.tokens
              mv "$MODEL_DIR/tokens.txt" "$MODEL_DIR/es_MX-claude-high.onnx.tokens"
              echo "Extraído del paquete oficial: modelo, tokens y espeak-ng-data"
            else
              echo "Modelo ya en caché, omitiendo descarga."
            fi

      - save_cache:
          key: voice-model-es-MX-claude-high-v1
          paths:
            - vendor/tts-sidecar/voices/es_MX-claude-high

      - persist_to_workspace:
          root: .
          paths:
            - vendor/tts-sidecar/voices/es_MX-claude-high

  # ─────────────────────────────────────────────────────────────────
  # Linux x86_64
  # ─────────────────────────────────────────────────────────────────
  linux-amd64:
    docker:
      - image: cimg/rust:1.88.0
    resource_class: medium
    working_directory: ~/EvolutiveX-Agent-Orchestrator
    retention:
      caches: 1d
    steps:
      - checkout
      - attach_workspace:
          at: ~/EvolutiveX-Agent-Orchestrator
      - restore_cache:
          keys:
            - cargo-linux-{{ checksum "sidecar/Cargo.lock" }}
            - cargo-linux-
      - run:
          name: "Instalar dependencias del sistema (libasound2)"
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y -qq zip libasound2-dev libespeak-ng-dev
      - run:
          name: "Agregar target Rust x86_64-unknown-linux-gnu"
          command: |
            rustup target add x86_64-unknown-linux-gnu
      - run:
          name: "Compilar tts-sidecar (release, x86_64-unknown-linux-gnu)"
          command: |
            cargo build --release \
              --manifest-path sidecar/Cargo.toml \
              --target x86_64-unknown-linux-gnu
      - save_cache:
          key: cargo-linux-{{ checksum "sidecar/Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - sidecar/target
      - run:
          name: "Empaquetar binario y dependencias (Linux)"
          command: |
            mkdir -p staging/linux-amd64
            cp sidecar/target/x86_64-unknown-linux-gnu/release/tts-sidecar staging/linux-amd64/
            LIB_PATH=$(find /usr -name "libespeak-ng.so*" | head -1)
            [ -n "$LIB_PATH" ] && cp "$LIB_PATH" staging/linux-amd64/libespeak-ng.so.1
            # espeak-ng-data viene del workspace (paquete oficial de sherpa-onnx)
            if [ -d "vendor/tts-sidecar/voices/es_MX-claude-high/espeak-ng-data" ]; then
              cp -r vendor/tts-sidecar/voices/es_MX-claude-high/espeak-ng-data staging/linux-amd64/
            fi
            # Incluir modelo de voz desde workspace
            mkdir -p staging/linux-amd64/vendor/tts-sidecar/voices
            cp -r vendor/tts-sidecar/voices/es_MX-claude-high \
              staging/linux-amd64/vendor/tts-sidecar/voices/
            cd staging && zip -r ../linux-amd64.zip linux-amd64 && cd ..
            sha256sum linux-amd64.zip | awk '{print "linux-amd64=" $1}' \
              > linux-amd64.sha256.txt
      - store_artifacts:
          path: linux-amd64.zip
      - store_artifacts:
          path: linux-amd64.sha256.txt

  # ─────────────────────────────────────────────────────────────────
  # Windows x86_64 (MSVC, sin gcc externo)
  # ─────────────────────────────────────────────────────────────────
  windows-amd64:
    machine:
      image: windows-server-2022-gui:current
      shell: bash.exe
    resource_class: windows.medium
    environment:
      CARGO_HOME: C:\Users\circleci\.cargo
      RUSTUP_HOME: C:\Users\circleci\.rustup
    retention:
      caches: 1d
    steps:
      - checkout
      - attach_workspace:
          at: .
      - restore_cache:
          keys:
            - cargo-win-registry-{{ checksum "sidecar/Cargo.lock" }}
            - cargo-win-registry-
      - restore_cache:
          keys:
            - cargo-win-target-{{ checksum "sidecar/Cargo.lock" }}
            - cargo-win-target-
      - restore_cache:
          keys:
            - choco-espeak-ng-v1
      - run:
          name: "Instalar Rust toolchain y target MSVC"
          shell: powershell.exe
          command: |
            $env:PATH = "$env:CARGO_HOME\bin;$env:PATH"
            if (-not (Test-Path "$env:CARGO_HOME\bin\rustc.exe")) {
              Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
              .\rustup-init.exe -y --default-toolchain stable --profile minimal
              rustup toolchain install stable --target x86_64-pc-windows-msvc
            }
      - run:
          name: "Verificar instalación de Rust"
          shell: powershell.exe
          command: |
            $env:PATH = "$env:CARGO_HOME\bin;$env:PATH"
            rustc --version
            cargo --version
      - run:
          name: "Compilar tts-sidecar (release, x86_64-pc-windows-msvc)"
          shell: powershell.exe
          command: |
            $env:PATH = "$env:CARGO_HOME\bin;$env:PATH"
            cargo build --release `
              --manifest-path sidecar/Cargo.toml `
              --target x86_64-pc-windows-msvc
      # FIX 2: Agregar ~/.rustup al caché para evitar re-descargar el toolchain
      - save_cache:
          key: cargo-win-registry-{{ checksum "sidecar/Cargo.lock" }}
          paths:
            - C:/Users/circleci/.cargo/registry
            - C:/Users/circleci/.cargo/git
            - C:/Users/circleci/.rustup
      - save_cache:
          key: cargo-win-target-{{ checksum "sidecar/Cargo.lock" }}
          paths:
            - sidecar\target
      # FIX 3: Instalar espeak-ng solo si no fue restaurado desde caché
      - run:
          name: "Instalar espeak-ng vía chocolatey"
          shell: powershell.exe
          command: |
            $ProgressPreference = "SilentlyContinue"
            if (-not (Test-Path "C:\Program Files\eSpeak NG\libespeak-ng.dll")) {
              choco install -y espeak-ng
            } else {
              Write-Host "espeak-ng ya en caché, omitiendo instalación."
            }
      # FIX 3: Guardar caché de espeak-ng tras la instalación
      - save_cache:
          key: choco-espeak-ng-v1
          paths:
            - C:/Program Files/eSpeak NG
      - run:
          name: "Empaquetar binario y dependencias (Windows)"
          shell: powershell.exe
          command: |
            $env:PATH = "$env:CARGO_HOME\bin;$env:PATH"
            New-Item -ItemType Directory -Force -Path staging/windows-amd64 | Out-Null
            Copy-Item sidecar\target\x86_64-pc-windows-msvc\release\tts-sidecar.exe staging\windows-amd64\
            # Copiar libespeak-ng.dll desde instalación de chocolatey
            Copy-Item "C:\Program Files\eSpeak NG\libespeak-ng.dll" "staging\windows-amd64\libespeak-ng.dll" -ErrorAction SilentlyContinue
            # espeak-ng-data viene del workspace (paquete oficial de sherpa-onnx)
            Copy-Item -Recurse "vendor\tts-sidecar\voices\es_MX-claude-high\espeak-ng-data" "staging\windows-amd64\" -ErrorAction SilentlyContinue
            # Incluir modelo de voz desde workspace
            New-Item -ItemType Directory -Force -Path "staging\windows-amd64\vendor\tts-sidecar\voices" | Out-Null
            Copy-Item -Recurse "vendor\tts-sidecar\voices\es_MX-claude-high" `
              "staging\windows-amd64\vendor\tts-sidecar\voices\"
            $ProgressPreference = "SilentlyContinue"
            # Comprimir desde el padre de staging para que windows-amd64/ sea la raíz del ZIP
            Compress-Archive -Path staging\windows-amd64 -DestinationPath windows-amd64.zip -Force
            $hash = (Get-FileHash windows-amd64.zip -Algorithm SHA256).Hash.ToLower()
            "windows-amd64=$hash" | Out-File windows-amd64.sha256.txt -Encoding ascii
      - store_artifacts:
          path: windows-amd64.zip
      - store_artifacts:
          path: windows-amd64.sha256.txt

  # ─────────────────────────────────────────────────────────────────
  # macOS Universal (arm64 + x86_64)
  # ─────────────────────────────────────────────────────────────────
  macos-amd64:
    macos:
      xcode: "16.4.0"
    resource_class: m4pro.medium
    working_directory: ~/EvolutiveX-Agent-Orchestrator
    retention:
      caches: 1d
    steps:
      - checkout
      - attach_workspace:
          at: ~/EvolutiveX-Agent-Orchestrator
      - restore_cache:
          keys:
            - cargo-macos-{{ checksum "sidecar/Cargo.lock" }}
            - cargo-macos-
      # FIX 4: Restaurar caché de espeak-ng antes de instalarlo
      - restore_cache:
          keys:
            - brew-espeak-ng-v1
      - run:
          name: "Instalar Rust toolchain y targets Apple Darwin"
          command: |
            if ! command -v rustup &> /dev/null; then
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
                | sh -s -- -y
              source $HOME/.cargo/env
              rustup target add aarch64-apple-darwin x86_64-apple-darwin
            fi
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
      - run:
          name: "Compilar tts-sidecar (release, aarch64-apple-darwin)"
          command: |
            source $HOME/.cargo/env
            cargo build --release \
              --manifest-path sidecar/Cargo.toml \
              --target aarch64-apple-darwin
      - run:
          name: "Compilar tts-sidecar (release, x86_64-apple-darwin)"
          command: |
            source $HOME/.cargo/env
            cargo build --release \
              --manifest-path sidecar/Cargo.toml \
              --target x86_64-apple-darwin
      - save_cache:
          key: cargo-macos-{{ checksum "sidecar/Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - ~/.cargo/bin
            - ~/.rustup
            - sidecar/target
      - run:
          name: "Crear Universal Binary (lipo)"
          command: |
            lipo -create \
              sidecar/target/aarch64-apple-darwin/release/tts-sidecar \
              sidecar/target/x86_64-apple-darwin/release/tts-sidecar \
              -output tts-sidecar-macos-universal
            lipo -info tts-sidecar-macos-universal
      - run:
          name: "Instalar espeak-ng vía Homebrew"
          command: |
            if ! brew list espeak-ng &>/dev/null; then
              brew install espeak-ng
            else
              echo "espeak-ng ya instalado — omitiendo."
            fi

      - save_cache:
          key: brew-espeak-ng-v1
          paths:
            - /opt/homebrew/Cellar/espeak-ng
            - /opt/homebrew/opt/espeak-ng
            - /opt/homebrew/share/espeak-ng-data

      - run:
          name: "Empaquetar binario y dependencias (macOS Universal)"
          command: |
            BREW_PREFIX=$(brew --prefix)
            mkdir -p staging/macos-amd64
            cp tts-sidecar-macos-universal staging/macos-amd64/
            # Homebrew en Apple Silicon instala las libs en opt/, no en lib/ — buscar en ambos
            ESPEAK_LIB=""
            if [ -f "$BREW_PREFIX/opt/espeak-ng/lib/libespeak-ng.dylib" ]; then
              ESPEAK_LIB="$BREW_PREFIX/opt/espeak-ng/lib/libespeak-ng.dylib"
            elif [ -f "$BREW_PREFIX/lib/libespeak-ng.dylib" ]; then
              ESPEAK_LIB="$BREW_PREFIX/lib/libespeak-ng.dylib"
            fi
            if [ -n "$ESPEAK_LIB" ]; then
              cp "$ESPEAK_LIB" staging/macos-amd64/
            fi
            # espeak-ng-data viene del workspace (paquete oficial de sherpa-onnx)
            if [ -d "vendor/tts-sidecar/voices/es_MX-claude-high/espeak-ng-data" ]; then
              cp -r vendor/tts-sidecar/voices/es_MX-claude-high/espeak-ng-data staging/macos-amd64/
            fi
            # Incluir modelo de voz desde workspace
            mkdir -p staging/macos-amd64/vendor/tts-sidecar/voices
            cp -r vendor/tts-sidecar/voices/es_MX-claude-high \
              staging/macos-amd64/vendor/tts-sidecar/voices/
            cd staging && zip -r ../macos-amd64.zip macos-amd64 && cd ..
            shasum -a 256 macos-amd64.zip \
              | awk '{print "macos-amd64=" $1}' \
              > macos-amd64.sha256.txt
      - store_artifacts:
          path: macos-amd64.zip
      - store_artifacts:
          path: macos-amd64.sha256.txt

workflows:
  build-all:
    jobs:
      - download-model
      - linux-amd64:
          requires:
            - download-model
      - windows-amd64:
          requires:
            - download-model
      - macos-amd64:
          requires:
            - download-model