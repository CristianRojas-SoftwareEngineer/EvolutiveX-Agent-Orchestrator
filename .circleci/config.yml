# CircleCI CI — tts-sidecar
# Job: Windows x86_64
version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    working_directory: ~/EvolutiveX-Agent-Orchestrator
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-win-{{ checksum "sidecar/Cargo.lock" }}
            - cargo-win-
      - run:
          name: "Instalar Rust toolchain MinGW"
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://win.rustup.rs -o rustup-init.exe
            ./rustup-init.exe -y --default-toolchain stable
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            rustup set default-host x86_64-pc-windows-gnu
            rustup toolchain install stable-x86_64-pc-windows-gnu
            rustup target add x86_64-pc-windows-gnu --toolchain stable-x86_64-pc-windows-gnu
      - run:
          name: "Crear cargo config (GNU toolchain paths)"
          command: |
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            mkdir -p diagnostics
            echo "=== Diagnostico de rustup ===" > diagnostics/rustup-info.txt
            echo "USERPROFILE=$USERPROFILE" >> diagnostics/rustup-info.txt
            echo "LOCALAPPDATA=$LOCALAPPDATA" >> diagnostics/rustup-info.txt
            echo "" >> diagnostics/rustup-info.txt
            echo "=== rustup which gcc (GNU) ===" >> diagnostics/rustup-info.txt
            rustup which gcc --toolchain stable-x86_64-pc-windows-gnu >> diagnostics/rustup-info.txt 2>&1
            echo "=== rustup which ar (GNU) ===" >> diagnostics/rustup-info.txt
            rustup which ar --toolchain stable-x86_64-pc-windows-gnu >> diagnostics/rustup-info.txt 2>&1
            echo "=== ls toolchains ===" >> diagnostics/rustup-info.txt
            ls "$USERPROFILE/.rustup/toolchains/" >> diagnostics/rustup-info.txt 2>&1
            mkdir -p .cargo
            # Buscar gcc.exe directamente en el directorio bin del toolchain GNU
            GNU_TOOLCHAIN="$USERPROFILE/.rustup/toolchains/stable-x86_64-pc-windows-gnu/bin"
            echo "=== Listar contenido de $GNU_TOOLCHAIN ===" >> diagnostics/rustup-info.txt
            ls "$GNU_TOOLCHAIN/" >> diagnostics/rustup-info.txt 2>&1
            GCC_PATH="$GNU_TOOLCHAIN/gcc.exe"
            AR_PATH="$GNU_TOOLCHAIN/ar.exe"
            echo "gcc_path=$GCC_PATH" >> diagnostics/rustup-info.txt
            echo "ar_path=$AR_PATH" >> diagnostics/rustup-info.txt
            if [ ! -f "$GCC_PATH" ]; then
              echo "ERROR: gcc.exe no existe en $GCC_PATH" >> diagnostics/rustup-info.txt
            fi
            GCC_FW="${GCC_PATH//\\//}"
            AR_FW="${AR_PATH//\\//}"
            echo "gcc_fw=$GCC_FW" >> diagnostics/rustup-info.txt
            echo "ar_fw=$AR_FW" >> diagnostics/rustup-info.txt
            # Escribir el TOML usando printf para evitar problemas con heredocs
            printf '[target.x86_64-pc-windows-gnu]\nar = "%s"\nlinker = "%s"\n' "$AR_FW" "$GCC_FW" > .cargo/config.toml
            echo "=== .cargo/config.toml resultante ===" >> diagnostics/rustup-info.txt
            cat .cargo/config.toml >> diagnostics/rustup-info.txt
            cat diagnostics/rustup-info.txt
      - store_artifacts:
          path: diagnostics
          destination: diagnostics
      - run:
          name: "Compilar tts-sidecar"
          command: |
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            GNU_TOOLCHAIN="$USERPROFILE/.rustup/toolchains/stable-x86_64-pc-windows-gnu/bin"
            export PATH="$GNU_TOOLCHAIN:$PATH"
            echo "gcc en PATH: $(which gcc 2>/dev/null || echo 'NO ENCONTRADO')"
            echo "gcc version:" >> diagnostics/build-output.txt
            gcc --version >> diagnostics/build-output.txt 2>&1
            echo "=== Compilando ===" >> diagnostics/build-output.txt
            cargo build --release \
              --manifest-path sidecar/Cargo.toml \
              --target x86_64-pc-windows-gnu \
              2>&1 | tee -a diagnostics/build-output.txt
            echo "=== Exit code: $? ===" >> diagnostics/build-output.txt
      - store_artifacts:
          path: diagnostics/build-output.txt
          destination: diagnostics

      - save_cache:
          key: cargo-win-{{ checksum "sidecar/Cargo.lock" }}
          paths:
            - C:\Users\circleci\.cargo\registry
            - C:\Users\circleci\.cargo\git
      - run:
          name: "Empaquetar artefacto"
          command: |
            mkdir -p staging
            cp sidecar/target/x86_64-pc-windows-gnu/release/tts-sidecar.exe staging/
            cd staging && zip -r ../tts-sidecar-windows-x86_64.zip . && cd ..
            sha256sum tts-sidecar-windows-x86_64.zip | awk '{print "windows-x86_64=" $1}' \
              > tts-sidecar-windows-x86_64.sha256.txt
      - store_artifacts:
          path: tts-sidecar-windows-x86_64.zip
      - store_artifacts:
          path: tts-sidecar-windows-x86_64.sha256.txt

workflows:
  build-windows:
    jobs:
      - build-windows