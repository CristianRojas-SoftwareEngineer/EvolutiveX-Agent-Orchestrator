# CircleCI CI pipeline — sidecar TTS
# Job: linux-amd64
version: 2.1

jobs:
  build-linux-amd64:
    docker:
      - image: rust:1.88
    resource_class: medium
    working_directory: ~/EvolutiveX-Agent-Orchestrator
    steps:
      - checkout
      - run:
          name: "Instalar dependencias"
          command: |
            apt-get update -qq
            apt-get install -y -qq zip libasound2-dev libespeak-ng-dev espeak-ng-data
      - run:
          name: "Agregar target x86_64-unknown-linux-gnu"
          command: |
            rustup target add x86_64-unknown-linux-gnu
      - run:
          name: "Compilar tts-sidecar"
          command: |
            cargo build --release --manifest-path sidecar/Cargo.toml --target x86_64-unknown-linux-gnu
      - run:
          name: "Empaquetar artefacto"
          command: |
            mkdir -p staging/linux-amd64
            cp sidecar/target/x86_64-unknown-linux-gnu/release/tts-sidecar staging/linux-amd64/
            LIB_PATH=$(find /usr -name "libespeak-ng.so*" | head -1)
            [ -n "$LIB_PATH" ] && cp "$LIB_PATH" staging/linux-amd64/libespeak-ng.so.1
            if [ -d "/usr/lib/x86_64-linux-gnu/espeak-ng-data" ]; then
              cp -r "/usr/lib/x86_64-linux-gnu/espeak-ng-data" staging/linux-amd64/
            elif [ -d "/usr/share/espeak-ng-data" ]; then
              cp -r "/usr/share/espeak-ng-data" staging/linux-amd64/
            fi
            cd staging
            zip -r ../linux-amd64.zip linux-amd64/
            cd ..
            sha256sum linux-amd64.zip | awk '{print "linux-amd64=" $1}' > linux-amd64.sha256.txt
      - store_artifacts:
          path: linux-amd64.zip
      - store_artifacts:
          path: linux-amd64.sha256.txt

workflows:
  build-linux-amd64:
    jobs:
      - build-linux-amd64
