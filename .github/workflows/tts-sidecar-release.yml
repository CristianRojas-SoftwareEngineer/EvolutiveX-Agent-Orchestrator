# Workflow de CI/CD para compilar y publicar el sidecar TTS
# Trigger: push de tag tts-sidecar-v* o dispatch manual
#
# Mapping triple Rust (job) → targetId npm (asset publicado):
# ┌──────────────────────────────┬────────────────────────┬─────────────────────┐
# │ Triple Rust                  │ Runner                 │ Asset publicado      │
# ├──────────────────────────────┼────────────────────────┼─────────────────────┤
# │ x86_64-pc-windows-msvc       │ windows-latest         │ windows-amd64.zip   │
# │ x86_64-unknown-linux-gnu     │ ubuntu-latest          │ linux-amd64.zip     │
# │ aarch64-unknown-linux-gnu    │ ubuntu-latest (cross)  │ linux-aarch64.zip   │
# │ x86_64-apple-darwin          │ macos-13               │ macos-amd64.zip     │
# │ aarch64-apple-darwin         │ macos-14               │ macos-aarch64.zip   │
# └──────────────────────────────┴────────────────────────┴─────────────────────┘

name: TTS Sidecar Release

on:
  push:
    tags:
      - 'tts-sidecar-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag de la versión a publicar (ej: tts-sidecar-v0.1.0)'
        required: true
        type: string

# Permisos requeridos por softprops/action-gh-release y por el commit del SHA.
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOBS DE BUILD — 5 targets nativos y cross-compilados
  # ─────────────────────────────────────────────────────────────

  build:
    name: Build ${{ matrix.target-id }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x64
          - target-id: windows-amd64
            rust-triple: x86_64-pc-windows-msvc
            runner: windows-latest
            binary-name: tts-sidecar.exe
            espeak-lib: libespeak-ng.dll
            cross: false

          # Linux x64
          - target-id: linux-amd64
            rust-triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary-name: tts-sidecar
            espeak-lib: libespeak-ng.so.1
            cross: false

          # Linux arm64 (cross-compilado desde ubuntu-latest)
          - target-id: linux-aarch64
            rust-triple: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            binary-name: tts-sidecar
            espeak-lib: libespeak-ng.so.1
            cross: true

          # macOS x64
          - target-id: macos-amd64
            rust-triple: x86_64-apple-darwin
            runner: macos-13
            binary-name: tts-sidecar
            espeak-lib: libespeak-ng.dylib
            cross: false

          # macOS arm64 (M1/M2)
          - target-id: macos-aarch64
            rust-triple: aarch64-apple-darwin
            runner: macos-14
            binary-name: tts-sidecar
            espeak-lib: libespeak-ng.dylib
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust ────────────────────────────────────────────────
      - name: Instalar toolchain Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-triple }}

      # ── Cross-toolchain para aarch64-linux ─────────────────
      - name: Instalar cross-toolchain para Linux arm64
        if: matrix.cross == true
        run: |
          sudo apt-get update -q
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # ── Dependencias nativas: espeak-ng ────────────────────
      - name: Instalar espeak-ng (Linux x64)
        if: matrix.runner == 'ubuntu-latest'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libespeak-ng-dev espeak-ng-data

      - name: Instalar espeak-ng (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: brew install espeak-ng

      - name: Instalar espeak-ng (Windows)
        if: matrix.runner == 'windows-latest'
        run: |
          choco install espeak-ng -y
        shell: pwsh

      # ── Compilar sidecar ───────────────────────────────────
      - name: Compilar tts-sidecar
        run: cargo build --release --manifest-path sidecar/Cargo.toml --target ${{ matrix.rust-triple }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross == 'true' && 'aarch64-linux-gnu-gcc' || '' }}

      # ── Preparar directorio de staging ─────────────────────
      - name: Preparar layout del ZIP
        shell: bash
        run: |
          TARGET_ID="${{ matrix.target-id }}"
          mkdir -p "staging/${TARGET_ID}"

          # Copiar binario
          BINARY_SRC="sidecar/target/${{ matrix.rust-triple }}/release/${{ matrix.binary-name }}"
          cp "${BINARY_SRC}" "staging/${TARGET_ID}/${{ matrix.binary-name }}"

      # ── Copiar espeak-ng (Linux) ────────────────────────────
      - name: Bundlear espeak-ng (Linux)
        if: matrix.runner == 'ubuntu-latest'
        shell: bash
        run: |
          TARGET_ID="${{ matrix.target-id }}"
          # Copiar librería shared
          LIB_PATH=$(find /usr -name "libespeak-ng.so*" | head -1)
          if [ -n "$LIB_PATH" ]; then
            cp "$LIB_PATH" "staging/${TARGET_ID}/libespeak-ng.so.1"
          fi
          # Copiar datos de espeak
          if [ -d "/usr/lib/x86_64-linux-gnu/espeak-ng-data" ]; then
            cp -r "/usr/lib/x86_64-linux-gnu/espeak-ng-data" "staging/${TARGET_ID}/"
          elif [ -d "/usr/share/espeak-ng-data" ]; then
            cp -r "/usr/share/espeak-ng-data" "staging/${TARGET_ID}/"
          fi

      # ── Copiar espeak-ng (macOS) ────────────────────────────
      - name: Bundlear espeak-ng (macOS)
        if: startsWith(matrix.runner, 'macos')
        shell: bash
        run: |
          TARGET_ID="${{ matrix.target-id }}"
          # Homebrew instala en /opt/homebrew (arm64) o /usr/local (x64)
          BREW_PREFIX=$(brew --prefix)
          LIB_PATH="${BREW_PREFIX}/lib/libespeak-ng.dylib"
          if [ -f "$LIB_PATH" ]; then
            cp "$LIB_PATH" "staging/${TARGET_ID}/libespeak-ng.dylib"
          fi
          DATA_DIR="${BREW_PREFIX}/lib/espeak-ng-data"
          if [ -d "$DATA_DIR" ]; then
            cp -r "$DATA_DIR" "staging/${TARGET_ID}/"
          fi

      # ── Copiar espeak-ng (Windows) ──────────────────────────
      - name: Bundlear espeak-ng (Windows)
        if: matrix.runner == 'windows-latest'
        shell: pwsh
        run: |
          $targetId = "${{ matrix.target-id }}"
          # Buscar la DLL instalada por choco
          $dllPath = Get-ChildItem -Path "C:\Program Files\eSpeak NG\" -Filter "libespeak-ng.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($dllPath) {
            Copy-Item $dllPath.FullName "staging\$targetId\libespeak-ng.dll"
          }
          $dataDir = "C:\Program Files\eSpeak NG\espeak-ng-data"
          if (Test-Path $dataDir) {
            Copy-Item -Recurse $dataDir "staging\$targetId\espeak-ng-data"
          }

      # ── Crear ZIP ──────────────────────────────────────────
      - name: Crear ZIP del target
        shell: bash
        run: |
          TARGET_ID="${{ matrix.target-id }}"
          cd staging
          # El ZIP debe contener la carpeta <targetId>/ en la raíz.
          if command -v zip &>/dev/null; then
            zip -r "../${TARGET_ID}.zip" "${TARGET_ID}/"
          else
            # PowerShell como fallback en Windows
            powershell -Command "Compress-Archive -Path '${TARGET_ID}' -DestinationPath '../${TARGET_ID}.zip'"
          fi
          cd ..

      # ── Calcular SHA256 ────────────────────────────────────
      - name: Calcular SHA256 del ZIP
        id: sha256
        shell: bash
        run: |
          TARGET_ID="${{ matrix.target-id }}"
          if command -v sha256sum &>/dev/null; then
            HASH=$(sha256sum "${TARGET_ID}.zip" | awk '{print $1}')
          else
            HASH=$(shasum -a 256 "${TARGET_ID}.zip" | awk '{print $1}')
          fi
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"
          echo "target-id=${TARGET_ID}" >> "$GITHUB_OUTPUT"

      # ── Subir artifact para el job release ─────────────────
      - name: Subir ZIP como artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target-id }}-zip
          path: ${{ matrix.target-id }}.zip

      - name: Subir SHA256 como artifact
        shell: bash
        run: |
          TARGET_ID="${{ matrix.target-id }}"
          HASH="${{ steps.sha256.outputs.hash }}"
          echo "${TARGET_ID}=${HASH}" > "${TARGET_ID}.sha256.txt"

      - name: Upload SHA256 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target-id }}-sha256
          path: ${{ matrix.target-id }}.sha256.txt

  # ─────────────────────────────────────────────────────────────
  # JOB DE RELEASE — Espera los 5 builds, descarga voz, publica
  # ─────────────────────────────────────────────────────────────

  release:
    name: Publicar Release
    runs-on: ubuntu-latest
    needs: build
    env:
      VOICE: es_MX-claude-high
      HF_BASE: https://huggingface.co/rhasspy/piper-voices/resolve/main/es/es_MX/claude/high

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necesario para poder hacer commit del SHA actualizado
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Descargar todos los ZIPs ───────────────────────────
      - name: Descargar artifacts de build
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      # ── Descargar voz desde Hugging Face ───────────────────
      - name: Descargar modelo de voz ${{ env.VOICE }}
        run: |
          VOICE="${{ env.VOICE }}"
          HF_BASE="${{ env.HF_BASE }}"
          mkdir -p "voices/${VOICE}"
          curl -fSL "${HF_BASE}/${VOICE}.onnx" -o "voices/${VOICE}/${VOICE}.onnx"
          curl -fSL "${HF_BASE}/${VOICE}.onnx.json" -o "voices/${VOICE}/${VOICE}.onnx.json"

      # ── Calcular SHA256 de archivos de voz ─────────────────
      - name: Calcular SHA256 de los archivos de voz
        id: voice-sha
        run: |
          VOICE="${{ env.VOICE }}"
          MODEL_HASH=$(sha256sum "voices/${VOICE}/${VOICE}.onnx" | awk '{print $1}')
          CONFIG_HASH=$(sha256sum "voices/${VOICE}/${VOICE}.onnx.json" | awk '{print $1}')
          echo "model-hash=${MODEL_HASH}" >> "$GITHUB_OUTPUT"
          echo "config-hash=${CONFIG_HASH}" >> "$GITHUB_OUTPUT"

      # ── Leer TAG de la versión ─────────────────────────────
      - name: Determinar versión del tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          # Extraer semver (ej: tts-sidecar-v0.1.0 → 0.1.0)
          VERSION="${TAG#tts-sidecar-v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── Leer los SHA256 de los ZIPs ────────────────────────
      - name: Recopilar hashes SHA256 de los builds
        id: build-hashes
        run: |
          declare -A HASHES
          for f in artifacts/*-sha256/*.sha256.txt; do
            while IFS='=' read -r key val; do
              HASHES["$key"]="$val"
            done < "$f"
          done
          echo "windows-amd64=${HASHES[windows-amd64]}" >> "$GITHUB_OUTPUT"
          echo "linux-amd64=${HASHES[linux-amd64]}" >> "$GITHUB_OUTPUT"
          echo "linux-aarch64=${HASHES[linux-aarch64]}" >> "$GITHUB_OUTPUT"
          echo "macos-amd64=${HASHES[macos-amd64]}" >> "$GITHUB_OUTPUT"
          echo "macos-aarch64=${HASHES[macos-aarch64]}" >> "$GITHUB_OUTPUT"

      # ── Generar tts-sidecar.sha256 con hashes reales ───────
      - name: Generar tts-sidecar.sha256
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/tts-sidecar-v${VERSION}/"
          VOICE="${{ env.VOICE }}"

          cat > tts-sidecar.sha256 << EOF
          {
            "version": "${VERSION}",
            "baseUrl": "${BASE_URL}",
            "binaries": {
              "windows-amd64": { "file": "windows-amd64.zip", "sha256": "${{ steps.build-hashes.outputs.windows-amd64 }}" },
              "linux-amd64":   { "file": "linux-amd64.zip",   "sha256": "${{ steps.build-hashes.outputs.linux-amd64 }}" },
              "linux-aarch64": { "file": "linux-aarch64.zip", "sha256": "${{ steps.build-hashes.outputs.linux-aarch64 }}" },
              "macos-amd64":   { "file": "macos-amd64.zip",   "sha256": "${{ steps.build-hashes.outputs.macos-amd64 }}" },
              "macos-aarch64": { "file": "macos-aarch64.zip", "sha256": "${{ steps.build-hashes.outputs.macos-aarch64 }}" }
            },
            "voices": {
              "${VOICE}": {
                "model": "voices/${VOICE}/${VOICE}.onnx",
                "config": "voices/${VOICE}/${VOICE}.onnx.json",
                "sha256": {
                  "model": "${{ steps.voice-sha.outputs.model-hash }}",
                  "config": "${{ steps.voice-sha.outputs.config-hash }}"
                }
              }
            }
          }
          EOF

      # ── Preparar los archivos de assets para la Release ─────
      - name: Preparar assets de Release
        run: |
          mkdir -p release-assets
          # ZIPs de los 5 targets
          for target in windows-amd64 linux-amd64 linux-aarch64 macos-amd64 macos-aarch64; do
            cp "artifacts/${target}-zip/${target}.zip" "release-assets/${target}.zip"
          done
          # Archivos de voz (estructura de paths para los assets de GitHub)
          VOICE="${{ env.VOICE }}"
          mkdir -p "release-assets/voices/${VOICE}"
          cp "voices/${VOICE}/${VOICE}.onnx" "release-assets/voices/${VOICE}/${VOICE}.onnx"
          cp "voices/${VOICE}/${VOICE}.onnx.json" "release-assets/voices/${VOICE}/${VOICE}.onnx.json"

      # ── Publicar la Release en GitHub ───────────────────────
      - name: Publicar Release ${{ steps.version.outputs.tag }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "TTS Sidecar ${{ steps.version.outputs.tag }}"
          body: |
            Release automática generada por el workflow de CI.

            ## Assets incluidos

            **Binarios del sidecar** (incluyen `libespeak-ng` + `espeak-ng-data`):
            - `windows-amd64.zip`
            - `linux-amd64.zip`
            - `linux-aarch64.zip`
            - `macos-amd64.zip`
            - `macos-aarch64.zip`

            **Modelo de voz** (`es_MX-claude-high`, calidad alta, ~61 MB):
            - `voices/es_MX-claude-high/es_MX-claude-high.onnx`
            - `voices/es_MX-claude-high/es_MX-claude-high.onnx.json`
          files: |
            release-assets/windows-amd64.zip
            release-assets/linux-amd64.zip
            release-assets/linux-aarch64.zip
            release-assets/macos-amd64.zip
            release-assets/macos-aarch64.zip
            release-assets/voices/es_MX-claude-high/es_MX-claude-high.onnx
            release-assets/voices/es_MX-claude-high/es_MX-claude-high.onnx.json

      # ── Commitear tts-sidecar.sha256 actualizado al repo ────
      - name: Commitear tts-sidecar.sha256 con SHA256 reales
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tts-sidecar.sha256
          git commit -m "ci: actualizar tts-sidecar.sha256 con hashes reales para ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
