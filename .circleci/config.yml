# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
jobs:
  say-hello:
    # Specify the macOS execution environment.
    # See: https://circleci.com
    macos:
      xcode: 15.4.0 # Selecciona la versión de Xcode (y por ende la versión de macOS)

    # El plan Free requiere indicar un tamaño de recurso básico para macOS
    resource_class: macos.m1.medium.gen1

    # Add steps to the job
    steps:
      # Checkout the code as the first step.
      - checkout
      - run:
          name: "Say hello from Mac"
          command: "echo Hello, World from $(uname)!"

# Orchestrate jobs using workflows
workflows:
  say-hello-workflow:
    jobs:
      - say-hello
