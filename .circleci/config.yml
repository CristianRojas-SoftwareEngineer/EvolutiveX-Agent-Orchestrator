# CircleCI CI — tts-sidecar
# Job: Windows x86_64
version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2022-gui:current
    resource_class: windows.medium
    working_directory: ~/EvolutiveX-Agent-Orchestrator
    steps:
      - checkout
      - restore_cache:
          keys:
            - cargo-win-{{ checksum "sidecar/Cargo.lock" }}
            - cargo-win-
      - run:
          name: "Instalar Rust toolchain MinGW"
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://win.rustup.rs -o rustup-init.exe
            ./rustup-init.exe -y --default-toolchain stable
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            rustup set default-host x86_64-pc-windows-gnu
            rustup toolchain install stable-x86_64-pc-windows-gnu
            rustup target add x86_64-pc-windows-gnu --toolchain stable-x86_64-pc-windows-gnu
      - run:
          name: "Diagnosticar ubicaciones de rustup"
          command: |
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            echo "=== Variables ==="
            echo "USERPROFILE=$USERPROFILE"
            echo "LOCALAPPDATA=$LOCALAPPDATA"
            echo "CARGO_HOME=$CARGO_HOME"
            echo "RUSTUP_HOME=$RUSTUP_HOME"
            echo ""
            echo "=== rustup which ==="
            rustup which gcc 2>&1 || echo "fallo"
            rustup which ar 2>&1 || echo "fallo"
            echo ""
            echo "=== Listar USERPROFILE/.rustup/toolchains ==="
            ls "$USERPROFILE/.rustup/toolchains/" 2>&1 || echo "no existe"
            echo ""
            echo "=== Listar LOCALAPPDATA/Rustup/toolchains ==="
            ls "$LOCALAPPDATA/Rustup/toolchains/" 2>&1 || echo "no existe"
            echo ""
            echo "=== Contenido de .cargo/bin (rustup) ==="
            ls "$USERPROFILE/.cargo/bin/" 2>&1 | head -10
      - run:
          name: "Crear cargo config con rustup which"
          command: |
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            mkdir -p .cargo
            GCC_PATH="$(rustup which gcc 2>/dev/null)"
            AR_PATH="$(rustup which ar 2>/dev/null)"
            echo "gcc=$GCC_PATH"
            echo "ar=$AR_PATH"
            # Si rustup which falló, intentar con la ruta LOCALAPPDATA
            if [ -z "$GCC_PATH" ]; then
              echo "rustup which gcc falló, intentando LOCALAPPDATA"
              GCC_PATH="$LOCALAPPDATA/Rustup/toolchains/stable-x86_64-pc-windows-gnu/bin/gcc.exe"
              AR_PATH="$LOCALAPPDATA/Rustup/toolchains/stable-x86_64-pc-windows-gnu/bin/ar.exe"
            fi
            # Convertir backslashes a forward slashes para TOML
            GCC_FW="${GCC_PATH//\\//}"
            AR_FW="${AR_PATH//\\//}"
            echo "gcc_fw=$GCC_FW"
            echo "ar_fw=$AR_FW"
            cat > .cargo/config.toml \<< EOF
            [target.x86_64-pc-windows-gnu]
            ar = "$AR_FW"
            linker = "$GCC_FW"
            EOF
            cat .cargo/config.toml
      - run:
          name: "Compilar tts-sidecar"
          command: |
            export PATH="$USERPROFILE/.cargo/bin:$PATH"
            GCC_DIR="$(dirname "$(rustup which gcc 2>/dev/null)" 2>/dev/null)"
            if [ -n "$GCC_DIR" ]; then
              export PATH="$GCC_DIR:$PATH"
            fi
            echo "gcc en PATH: $(which gcc 2>/dev/null || echo 'no encontrado')"
            cargo build --release \
              --manifest-path sidecar/Cargo.toml \
              --target x86_64-pc-windows-gnu
      - save_cache:
          key: cargo-win-{{ checksum "sidecar/Cargo.lock" }}
          paths:
            - C:\Users\circleci\.cargo\registry
            - C:\Users\circleci\.cargo\git
      - run:
          name: "Empaquetar artefacto"
          command: |
            mkdir -p staging
            cp sidecar/target/x86_64-pc-windows-gnu/release/tts-sidecar.exe staging/
            cd staging && zip -r ../tts-sidecar-windows-x86_64.zip . && cd ..
            sha256sum tts-sidecar-windows-x86_64.zip | awk '{print "windows-x86_64=" $1}' \
              > tts-sidecar-windows-x86_64.sha256.txt
      - store_artifacts:
          path: tts-sidecar-windows-x86_64.zip
      - store_artifacts:
          path: tts-sidecar-windows-x86_64.sha256.txt

workflows:
  build-windows:
    jobs:
      - build-windows