# CircleCI CI pipeline — sidecar TTS
version: 2.1

orbs:
  win: circleci/windows@5.0

jobs:
  build-windows-amd64:
    executor:
      name: win/default
      size: medium
    steps:
      - checkout
      - run:
          name: "Descargar e instalar rustup"
          command: |
            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            Start-Process -FilePath .\rustup-init.exe -ArgumentList "-y" -Wait
            Remove-Item rustup-init.exe
      - run:
          name: "Agregar target x86_64-pc-windows-msvc"
          command: |
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
            rustup target add x86_64-pc-windows-msvc
      - run:
          name: "Compilar tts-sidecar"
          command: |
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
            cargo build --release --manifest-path sidecar/Cargo.toml --target x86_64-pc-windows-msvc
      - run:
          name: "Empaquetar artefacto"
          command: |
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
            New-Item -ItemType Directory -Force -Path staging/windows-amd64 | Out-Null
            Copy-Item sidecar/target/x86_64-pc-windows-msvc/release/tts-sidecar.exe staging/windows-amd64/
            Compress-Archive -Path staging/windows-amd64 -DestinationPath windows-amd64.zip -Force
            $hash = (Get-FileHash -Algorithm SHA256 windows-amd64.zip).Hash
            "windows-amd64=$hash" | Out-File -FilePath windows-amd64.sha256.txt -Encoding ASCII
      - store_artifacts:
          path: windows-amd64.zip
      - store_artifacts:
          path: windows-amd64.sha256.txt

workflows:
  build-workflow:
    jobs:
      - build-windows-amd64
