version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2022-gui:current
      shell: bash.exe
    resource_class: windows.medium
    steps:
      - checkout
      - run:
          name: "Instalar Rust"
          shell: powershell.exe
          command: |
            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --target x86_64-pc-windows-msvc
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
      - run:
          name: "Verificar instalación"
          shell: powershell.exe
          command: |
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
            rustc --version
            cargo --version
      - run:
          name: "Compilar tts-sidecar"
          shell: powershell.exe
          command: |
            $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
            cargo build --release `
              --manifest-path sidecar/Cargo.toml `
              --target x86_64-pc-windows-msvc
      - store_artifacts:
          path: sidecar\target\x86_64-pc-windows-msvc\release\tts-sidecar.exe

workflows:
  build-all:
    jobs:
      - build-windows
